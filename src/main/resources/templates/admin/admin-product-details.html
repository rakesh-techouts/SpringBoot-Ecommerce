<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin | Product Details</title>
    <link rel="stylesheet" href="/style.css"/>
    <style>
        body { background: #f3f6fb; }
        .admin-header {
            background: linear-gradient(135deg, #1e2a44, #253a66);
            color: #fff;
            border-radius: 14px;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
            box-shadow: 0 8px 22px rgba(20, 37, 73, 0.25);
        }
        .admin-header h2 { margin: 0; color: #fff; }
        .detail-card {
            border-radius: 14px;
            border: 1px solid #d9e1ef;
            box-shadow: 0 6px 18px rgba(25, 45, 88, 0.08);
            padding: 1rem;
        }
        .detail-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 1.2rem;
            align-items: start;
        }
        .product-image {
            width: 100%;
            max-width: 320px;
            height: 320px;
            object-fit: contain;
            border-radius: 12px;
            background: #fff;
            border: 1px solid #d9e1ef;
            padding: 0.5rem;
        }
        .meta {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 0.5rem 1rem;
        }
        .meta .label { color: #64748b; font-weight: 700; }
        .meta .value { color: #0f172a; }
        .action-row { display: flex; gap: 0.6rem; margin-top: 1rem; flex-wrap: wrap; }
        @media (max-width: 900px) {
            .detail-layout { grid-template-columns: 1fr; }
            .product-image { max-width: 100%; height: 260px; }
        }
    </style>
</head>
<body>
<div class="container">
    <section class="section">
        <div class="admin-header" style="display:flex; justify-content:space-between; align-items:center; gap:0.6rem; flex-wrap:wrap;">
            <h2>Admin Panel - Product Details</h2>
            <div style="display:flex; gap:0.5rem;">
                <a class="btn btn-secondary" href="/admin/products">Products</a>
                <a class="btn btn-secondary" href="/admin/orders">Orders</a>
                <a class="btn btn-secondary" href="/admin/users">Users</a>
                <a class="btn btn-secondary" href="/logout">Logout</a>
            </div>
        </div>

        <div class="card detail-card">
            <div class="detail-layout">
                <img class="product-image" th:src="${product.imageUrl}" th:alt="${product.name}"
                     onerror="this.onerror=null;this.src='/placeholder-product.svg';"/>
                <div>
                    <h3 th:text="${product.name}">Product Name</h3>
                    <div class="meta">
                        <div class="label">Product ID</div>
                        <div class="value" th:text="${product.id}">1</div>

                        <div class="label">Category</div>
                        <div class="value" th:text="${product.category}">Laptop</div>

                        <div class="label">Price</div>
                        <div class="value">Rs. <span th:text="${product.price}">0</span></div>

                        <div class="label">Stock</div>
                        <div class="value" th:text="${product.stock}">0</div>

                        <div class="label">Image URL</div>
                        <div class="value" th:text="${product.imageUrl}">url</div>
                    </div>

                    <h4 style="margin-top:1rem;">Description</h4>
                    <p class="muted" th:text="${product.description}">Description</p>

                    <div class="action-row">
                        <a class="btn btn-primary" th:href="'/admin/products/' + ${product.id} + '/edit'">Edit Product</a>
                        <form th:action="'/admin/products/' + ${product.id} + '/delete'" method="post">
                            <button class="btn btn-secondary" type="submit">Delete Product</button>
                        </form>
                        <a class="btn btn-secondary" href="/admin/products">Back to Products</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
