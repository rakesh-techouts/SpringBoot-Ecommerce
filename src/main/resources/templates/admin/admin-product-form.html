<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${isEdit} ? 'Admin | Edit Product' : 'Admin | Add Product'">Admin | Product</title>
    <link rel="stylesheet" href="/style.css"/>
</head>
<body>
<div class="container">
    <section class="section">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:0.6rem; flex-wrap:wrap;">
            <h2 th:text="${isEdit} ? 'Edit Product' : 'Add Product'">Product</h2>
            <div style="display:flex; gap:0.5rem;">
                <a class="btn btn-secondary" href="/admin/products">Products</a>
                <a class="btn btn-secondary" href="/admin/orders">Orders</a>
                <a class="btn btn-secondary" href="/admin/users">Users</a>
                <a class="btn btn-secondary" href="/logout">Logout</a>
            </div>
        </div>
        <div class="card spaced-top">
            <form method="post" action="/admin/products/save">
                <input th:if="${isEdit}" type="hidden" name="id" th:value="${product.id}"/>

                <label>Name</label>
                <input type="text" name="name" th:value="${product.name}" required/>

                <label>Category</label>
                <input type="text" name="category" th:value="${product.category}" required/>

                <label>Price</label>
                <input type="number" step="0.01" min="0" name="price" th:value="${product.price}" required/>

                <label>Stock</label>
                <input type="number" min="0" name="stock" th:value="${product.stock}" required/>

                <label>Image URL</label>
                <input type="url" name="imageUrl" th:value="${product.imageUrl}" required/>

                <label>Description</label>
                <textarea name="description" rows="5" required th:text="${product.description}"></textarea>

                <div style="display:flex; gap:0.6rem; margin-top:1rem;">
                    <button class="btn btn-primary" type="submit" th:text="${isEdit} ? 'Update Product' : 'Create Product'">Save</button>
                    <a class="btn btn-secondary" href="/admin/products">Cancel</a>
                </div>
            </form>
        </div>
    </section>
</div>
</body>
</html>
